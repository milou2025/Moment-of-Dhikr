<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moment of Dhikr</title>
    <style>
      .prayer-container {
        display: flex; justify-content: space-around; flex-wrap: wrap;
        gap: 10px; padding: 15px; background: rgba(255, 255, 255, 0.05);
        border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
        margin: 20px auto; max-width: 800px; direction: rtl;
      }
      .prayer-card { text-align: center; color: white; font-family: sans-serif; }
      .prayer-card h4 { color: #ffcc00; margin: 5px 0; font-size: 0.8rem; }
      .prayer-time { font-weight: bold; font-size: 1rem; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <div class="prayer-container" id="prayer-times-styled"></div>

    <script>
      // جلب أوقات الصلاة
      fetch('https://api.aladhan.com/v1/timingsByCity?city=Algiers&country=Algeria&method=3')
      .then(res => res.json()).then(data => {
        const t = data.data.timings;
        const prayers = [
          {n: 'الفجر', v: t.Fajr}, {n: 'الظهر', v: t.Dhuhr}, 
          {n: 'العصر', v: t.Asr}, {n: 'المغرب', v: t.Maghrib}, {n: 'العشاء', v: t.Isha}
        ];
        document.getElementById('prayer-times-styled').innerHTML = prayers.map(p => `
          <div class="prayer-card">
            <h4>${p.n}</h4>
            <div class="prayer-time">${p.v}</div>
          </div>
        `).join('');
      });

      // ربط الصوت بالزر الأحمر اللي في الموقع
      fetch('https://api.alquran.cloud/v1/ayah/random/ar.alafasy')
      .then(res => res.json()).then(data => {
        const audioObj = new Audio(data.data.audio);
        document.addEventListener('click', function(e) {
          // إذا ضغطت على زر التشغيل الأصفر
          if (e.target.closest('button')) {
            if (audioObj.paused) audioObj.play();
            else audioObj.pause();
          }
        });
      });
    </script>
  </body>
</html>
