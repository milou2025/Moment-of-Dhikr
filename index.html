<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moment of Dhikr</title>
    <style>
      /* تنسيق هيدر أوقات الصلاة */
      #p-header {
        display: none; justify-content: space-around; background: #111;
        padding: 10px; border-bottom: 2px solid #ffcc00; color: #fff;
        font-family: sans-serif; font-size: 0.8rem; direction: rtl;
        position: sticky; top: 0; z-index: 9999;
      }
      .p-time { color: #ffcc00; font-weight: bold; margin-right: 5px; }
    </style>
  </head>
  <body>
    <div id="p-header"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // 1. جلب أوقات الصلاة حسب الموقع
      navigator.geolocation.getCurrentPosition(pos => {
        fetch(`https://api.aladhan.com/v1/timings?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&method=3`)
          .then(res => res.json()).then(d => {
            const t = d.data.timings;
            const header = document.getElementById('p-header');
            header.style.display = 'flex';
            header.innerHTML = `
              <div>الفجر<span class="p-time">${t.Fajr}</span></div>
              <div>الظهر<span class="p-time">${t.Dhuhr}</span></div>
              <div>العصر<span class="p-time">${t.Asr}</span></div>
              <div>المغرب<span class="p-time">${t.Maghrib}</span></div>
              <div>العشاء<span class="p-time">${t.Isha}</span></div>
            `;
          });
      });

      // 2. تحديث الآية والصوت (بدون تخلاط)
      async function updateVerseSafe() {
        const res = await fetch('https://api.alquran.cloud/v1/ayah/random/ar.alafasy');
        const data = await res.json();
        const ayah = data.data.text;
        const audio = new Audio(data.data.audio);

        const checkInterval = setInterval(() => {
          // هنا السكريبت يحوس *فقط* على النص الطويل اللي فيه كلمة "فَاذْكُرُونِي"
          const elements = document.querySelectorAll('p');
          elements.forEach(el => {
            if (el.innerText.includes("فَاذْكُرُونِي")) {
              el.innerText = ayah; 
              el.style.color = "#fff"; // نضمن اللون أبيض
              clearInterval(checkInterval); // غير يلقاها ويحبس ما يقيس والو آخر
            }
          });

          // ربط الزر الأصفر بالصوت
          const playBtn = document.querySelector('button'); 
          if (playBtn && !playBtn.dataset.linked) {
            playBtn.onclick = (e) => {
              e.preventDefault();
              if(audio.paused) audio.play(); else audio.pause();
            };
            playBtn.dataset.linked = "true";
          }
        }, 1000);
      }

      updateVerseSafe();
    </script>
  </body>
</html>
