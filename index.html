<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moment of Dhikr</title>
    <style>
      /* تنسيق هيدر أوقات الصلاة - مخفي حتى تجهز البيانات */
      #p-header {
        display: none; justify-content: space-around; background: #111;
        padding: 8px; border-bottom: 2px solid #ffcc00; color: #fff;
        font-family: sans-serif; font-size: 0.75rem; direction: rtl;
        position: sticky; top: 0; z-index: 9999;
      }
      .p-time { color: #ffcc00; font-weight: bold; margin-right: 4px; }
    </style>
  </head>
  <body>
    <div id="p-header"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // 1. جلب الموقع والأوقات بدقة
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude, longitude } = pos.coords;
        fetch(`https://api.aladhan.com/v1/timings?latitude=${latitude}&longitude=${longitude}&method=3`)
          .then(res => res.json()).then(d => {
            const t = d.data.timings;
            const header = document.getElementById('p-header');
            header.style.display = 'flex';
            header.innerHTML = `
              <div>الفجر<span class="p-time">${t.Fajr}</span></div>
              <div>الظهر<span class="p-time">${t.Dhuhr}</span></div>
              <div>العصر<span class="p-time">${t.Asr}</span></div>
              <div>المغرب<span class="p-time">${t.Maghrib}</span></div>
              <div>العشاء<span class="p-time">${t.Isha}</span></div>
            `;
          });
      }, () => {
        console.log("Location denied");
      });

      // 2. تحديث الآية والزر الأصفر (بدقة عالية)
      async function fixSite() {
        try {
          const res = await fetch('https://api.alquran.cloud/v1/ayah/random/ar.alafasy');
          const data = await res.json();
          const ayahText = data.data.text;
          const audio = new Audio(data.data.audio);

          // محاولة استهداف الآية والزر كل ثانية حتى يظهروا
          const checkExist = setInterval(() => {
            // نبحث عن النص اللي فيه "فَاذْكُرُونِي" بالظبط باش ما نخسروش السيت كامل
            const allElements = document.querySelectorAll('p, h2, span');
            allElements.forEach(el => {
              if (el.innerText.includes("فَاذْكُرُونِي") || (el.innerText.length > 30 && el.innerText.length < 300)) {
                if(!el.dataset.fixed) { // باش ما يبقاش يعاود يبدلها
                  el.innerText = ayahText;
                  el.dataset.fixed = "true";
                }
              }
            });

            // الزر الأصفر (الـ Play)
            const playBtn = document.querySelector('button svg')?.closest('button') || document.querySelector('button');
            if (playBtn) {
              playBtn.onclick = (e) => {
                e.preventDefault();
                if(audio.paused) audio.play(); else audio.pause();
              };
            }
            
            // إذا تم تعديل كلش، نحبس الـ Interval بعد 10 ثواني
          }, 1000);
          
          setTimeout(() => clearInterval(checkExist), 15000);

        } catch (e) { console.error(e); }
      }

      fixSite();
    </script>
  </body>
</html>
