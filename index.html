<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moment of Dhikr</title>
    <style>
      /* تنسيق الهيدر لأوقات الصلاة */
      #p-header {
        display: flex; justify-content: space-around; background: #000;
        padding: 10px; border-bottom: 1px solid #ffcc00; color: #fff;
        font-family: sans-serif; font-size: 0.7rem; direction: rtl;
      }
      .p-time { color: #ffcc00; font-weight: bold; }
      
      /* تنسيق الخانة الجديدة (Card) */
      .p-card-trigger {
        background: rgba(255, 255, 255, 0.05); border: 1px solid #333;
        border-radius: 12px; padding: 15px; margin: 15px; display: flex;
        align-items: center; cursor: pointer; direction: rtl;
      }
    </style>
  </head>
  <body>
    <div id="p-header">جاري تحميل الأوقات...</div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // 1. جلب الموقع والأوقات
      function loadPrayers(lat, lon) {
        fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=3`)
          .then(res => res.json()).then(d => {
            const t = d.data.timings;
            document.getElementById('p-header').innerHTML = `
              <div>الفجر <span class="p-time">${t.Fajr}</span></div>
              <div>الظهر <span class="p-time">${t.Dhuhr}</span></div>
              <div>العصر <span class="p-time">${t.Asr}</span></div>
              <div>المغرب <span class="p-time">${t.Maghrib}</span></div>
              <div>العشاء <span class="p-time">${t.Isha}</span></div>
            `;
          });
      }

      // طلب الموقع تلقائياً
      navigator.geolocation.getCurrentPosition(p => loadPrayers(p.coords.latitude, p.coords.longitude));

      // 2. تحديث الآية والصوت المتطابق
      async function setupQuran() {
        const res = await fetch('https://api.alquran.cloud/v1/ayah/random/ar.alafasy');
        const data = await res.json();
        const audio = new Audio(data.data.audio);

        // انتظر ظهور العناصر في الشاشة
        const interval = setInterval(() => {
          const allPs = document.querySelectorAll('p');
          allPs.forEach(p => {
            if (p.innerText.includes("فَاذْكُرُونِي") || p.innerText.length > 20) {
              p.innerText = data.data.text; // تغيير النص
              clearInterval(interval);
            }
          });

          // ربط الزر بالصوت
          const btn = document.querySelector('button');
          if (btn) {
            btn.onclick = () => audio.play();
          }
        }, 1000);
      }

      setupQuran();

      // 3. إضافة خانة "أوقات الصلاة" وسط الصفحة
      setTimeout(() => {
        const card = document.createElement('div');
        card.className = 'p-card-trigger';
        card.innerHTML = `<div style="background:#2ecc71; padding:10px; border-radius:8px; margin-left:15px;">🕌</div> 
                          <div style="color:#fff; text-align:right;"><b>أوقات الصلاة</b><br><small style="color:#aaa;">تحديث تلقائي حسب موقعك</small></div>`;
        document.getElementById('root').prepend(card);
      }, 3000);
    </script>
  </body>
</html>
