<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نور | NUR</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#050505;
  --gold:#c5a059;
  --card:#0c0c0c;
  --border:#1a1a1a;
  --white:#ffffff;
}

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:var(--bg);
  color:var(--white);
}

header {
  text-align:center;
  padding:25px;
  border-bottom:1px solid var(--border);
}

h1 {
  color:var(--gold);
}

.container {
  max-width:600px;
  margin:auto;
  padding:15px;
}

.card {
  background:var(--card);
  padding:20px;
  margin:15px 0;
  border-radius:15px;
  border:1px solid var(--border);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

button {
  background:var(--gold);
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  width:100%;
}

input {
  padding:10px;
  border-radius:10px;
  border:none;
  width:100%;
  margin-bottom:10px;
}

audio {
  width:100%;
  margin-top:10px;
}

footer {
  text-align:center;
  padding:20px;
  color:#777;
}
</style>

<!-- AdSense (بدل XXXX لاحقا) -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXX"
crossorigin="anonymous"></script>

</head>

<body>

<header>
  <h1>🌙 نور</h1>
  <p>رفيقك اليومي لذكر الله</p>
</header>

<div class="container">

<!-- آية -->
<div class="card">
  <h2>📖 آية اليوم</h2>
  <p id="ayah">جاري التحميل...</p>
  <audio id="audio" controls></audio>
</div>

<!-- حديث -->
<div class="card">
  <h2>🕌 حديث</h2>
  <p id="hadith"></p>
</div>

<!-- ذكر -->
<div class="card">
  <h2>🤲 ذكر</h2>
  <p id="dhikr"></p>
  <button onclick="changeDhikr()">تغيير الذكر</button>
</div>

<!-- إعلان -->
<div class="card">
  <h3>📢 إعلان</h3>

  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXX"
       data-ad-slot="1234567890"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>

  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>

<!-- اشتراك -->
<div class="card">
  <h2>📩 اشترك</h2>
  <input type="email" id="email" placeholder="ادخل ايميلك">
  <button onclick="subscribe()">اشترك</button>
  <p id="msg"></p>
</div>

</div>

<footer>
© 2026 NUR
</footer>

<script>
// تحميل آية
async function loadAyah(){
  try{
    const res = await fetch("https://api.alquran.cloud/v1/ayah/random/ar.alafasy");
    const data = await res.json();
    document.getElementById("ayah").innerText = data.data.text;
    document.getElementById("audio").src = data.data.audio;
  }catch{
    document.getElementById("ayah").innerText = "تعذر تحميل الآية";
  }
}

// حديث
const hadiths = [
"إنما الأعمال بالنيات",
"خيركم من تعلم القرآن وعلمه",
"الدين النصيحة",
"من سلك طريقا يلتمس فيه علما سهل الله له به طريقا إلى الجنة"
];

document.getElementById("hadith").innerText =
hadiths[Math.floor(Math.random()*hadiths.length)];

// أذكار
const adhkar = [
"سبحان الله",
"الحمد لله",
"الله أكبر",
"لا إله إلا الله",
"أستغفر الله",
"اللهم صل وسلم على نبينا محمد"
];

function changeDhikr(){
  document.getElementById("dhikr").innerText =
  adhkar[Math.floor(Math.random()*adhkar.length)];
}

// اشتراك
function subscribe(){
  const email = document.getElementById("email").value;
  const msg = document.getElementById("msg");

  if(!email.includes("@")){
    msg.innerText="❌ ايميل غير صحيح";
    msg.style.color="red";
    return;
  }

  localStorage.setItem("email",email);
  msg.innerText="✅ تم الاشتراك";
  msg.style.color="green";
}

// تشغيل
loadAyah();
changeDhikr();
</script>

</body>
</html>
